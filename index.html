<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventory Calculators</title>

  <style>
    :root {
      --bg: #f7f8fa;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --accent: #111827;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px;
    }

    header {
      margin-bottom: 20px;
    }

    h1, h2 {
      margin-bottom: 10px;
    }

    p {
      color: var(--muted);
    }

    .hero {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      gap: 20px;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
    }

    label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    button {
      margin-top: 15px;
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: white;
      cursor: pointer;
    }

    .result {
      margin-top: 15px;
      padding: 12px;
      background: #f3f4f6;
      border-radius: 8px;
      font-weight: bold;
    }

    footer {
      margin-top: 40px;
      color: var(--muted);
    }
  </style>
</head>

<body>
  <div class="container">

    <header>
      <h1>Inventory Calculators</h1>
      <p>Simple tools to help you manage stock and inventory decisions.</p>
    </header>

    <section class="hero">
      <h2>Free Inventory Tools</h2>
      <p>Use these calculators to improve your stock management.</p>
    </section>

    <section class="grid">

      <!-- REORDER POINT -->
      <div class="card">
        <h2>Reorder Point Calculator</h2>

        <label>Average daily demand</label>
        <input id="dailyDemand" type="number" placeholder="e.g. 20">

        <label>Lead time (days)</label>
        <input id="leadTime" type="number" placeholder="e.g. 10">

        <label>Safety stock</label>
        <input id="safetyStock" type="number" placeholder="e.g. 50">

        <button onclick="calculateReorderPoint()">Calculate</button>

        <div id="reorderResult" class="result">Reorder point: —</div>
      </div>

      <!-- EOQ -->
      <div class="card">
        <h2>EOQ Calculator</h2>

        <label>Annual demand</label>
        <input id="annualDemand" type="number" placeholder="e.g. 5000">

        <label>Order cost per order</label>
        <input id="orderCost" type="number" placeholder="e.g. 45">

        <label>Holding cost per unit per year</label>
        <input id="holdingCost" type="number" placeholder="e.g. 6">

        <button onclick="calculateEOQ()">Calculate</button>

        <div id="eoqResult" class="result">EOQ: —</div>
      </div>

    </section>

    <footer>
      <p>© 2026 Inventory Calculators</p>
    </footer>

  </div>

  <script>
    function calculateReorderPoint() {
      const dailyDemand = parseFloat(document.getElementById('dailyDemand').value);
      const leadTime = parseFloat(document.getElementById('leadTime').value);
      const safetyStock = parseFloat(document.getElementById('safetyStock').value);

      if (isNaN(dailyDemand) || isNaN(leadTime) || isNaN(safetyStock)) {
        document.getElementById('reorderResult').textContent = 'Enter valid numbers';
        return;
      }

      const result = (dailyDemand * leadTime) + safetyStock;
      document.getElementById('reorderResult').textContent =
        `Reorder point: ${result.toFixed(2)} units`;
    }

    function calculateEOQ() {
      const demand = parseFloat(document.getElementById('annualDemand').value);
      const orderCost = parseFloat(document.getElementById('orderCost').value);
      const holdingCost = parseFloat(document.getElementById('holdingCost').value);

      if (isNaN(demand) || isNaN(orderCost) || isNaN(holdingCost)) {
        document.getElementById('eoqResult').textContent = 'Enter valid numbers';
        return;
      }

      const eoq = Math.sqrt((2 * demand * orderCost) / holdingCost);
      document.getElementById('eoqResult').textContent =
        `EOQ: ${eoq.toFixed(2)} units`;
    }
  </script>

</body>
</html>
