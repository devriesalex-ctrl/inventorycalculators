<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventory Calculators</title>

  <style>
    :root {
      --bg: #f7f8fa;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --accent: #111827;
      --soft: #f3f4f6;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 24px;
    }

    h1, h2, h3 { margin-bottom: 10px; }
    p { color: var(--muted); }

    .hero, .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      gap: 20px;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    }

    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    button {
      margin-top: 12px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: white;
      cursor: pointer;
    }

    .result {
      margin-top: 12px;
      padding: 10px;
      background: var(--soft);
      border-radius: 8px;
      font-weight: bold;
    }

    footer {
      margin-top: 40px;
      color: var(--muted);
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="container">

    <h1>Inventory Calculators</h1>
    <p>Simple tools to help you manage stock and inventory decisions.</p>

    <div class="hero">
      <h2>Free Inventory Tools</h2>
      <p>Use these calculators to improve your inventory management.</p>
    </div>

    <div class="grid">

      <!-- REORDER -->
      <div class="card">
        <h2>Reorder Point Calculator</h2>

        <label>Daily demand</label>
        <input id="dailyDemand" type="number" placeholder="e.g. 20">

        <label>Lead time (days)</label>
        <input id="leadTime" type="number" placeholder="e.g. 10">

        <label>Safety stock</label>
        <input id="safetyStock" type="number" placeholder="e.g. 50">

        <button onclick="calculateReorder()">Calculate</button>

        <div id="reorderResult" class="result">Reorder point: —</div>
      </div>

      <!-- EOQ -->
      <div class="card">
        <h2>EOQ Calculator</h2>

        <label>Annual demand</label>
        <input id="annualDemand" type="number" placeholder="e.g. 5000">

        <label>Order cost</label>
        <input id="orderCost" type="number" placeholder="e.g. 45">

        <label>Holding cost</label>
        <input id="holdingCost" type="number" placeholder="e.g. 6">

        <button onclick="calculateEOQ()">Calculate</button>

        <div id="eoqResult" class="result">EOQ: —</div>
      </div>

    </div>

    <footer>
      <p>© 2026 Inventory Calculators</p>
    </footer>

  </div>

  <script>
    function calculateReorder() {
      let d = parseFloat(document.getElementById("dailyDemand").value);
      let l = parseFloat(document.getElementById("leadTime").value);
      let s = parseFloat(document.getElementById("safetyStock").value);

      if (isNaN(d) || isNaN(l) || isNaN(s)) {
        document.getElementById("reorderResult").textContent = "Enter valid numbers";
        return;
      }

      let result = (d * l) + s;
      document.getElementById("reorderResult").textContent =
        "Reorder point: " + result.toFixed(2);
    }

    function calculateEOQ() {
      let d = parseFloat(document.getElementById("annualDemand").value);
      let o = parseFloat(document.getElementById("orderCost").value);
      let h = parseFloat(document.getElementById("holdingCost").value);

      if (isNaN(d) || isNaN(o) || isNaN(h) || h === 0) {
        document.getElementById("eoqResult").textContent = "Enter valid numbers";
        return;
      }

      let eoq = Math.sqrt((2 * d * o) / h);
      document.getElementById("eoqResult").textContent =
        "EOQ: " + eoq.toFixed(2);
    }
  </script>

</body>
</html>
